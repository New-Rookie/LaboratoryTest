name: llm_concurrency
kind: llm_benchmark
runner: ollama
evaluator: llm_benchmark
collectors:
  - nvidia_smi
requires:
  - llm.ollama
description: LLM 并发压测模板，默认使用 Ollama，可切换 runner 和参数。
params:
  base_url: http://localhost:11434
  model: qwen2.5:7b
  prompt: 请总结一下大模型部署测试需要关注哪些指标。
  concurrency: 4
  total_requests: 8
  temperature: 0.3
  max_tokens: 256
  timeout: 180
thresholds:
  success_rate_min: 0.95
  avg_latency_max_seconds: 60
