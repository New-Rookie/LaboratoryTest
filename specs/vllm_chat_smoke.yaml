name: vllm_chat_smoke
kind: llm_benchmark
runner: vllm
evaluator: llm_benchmark
collectors:
  - nvidia_smi
requires:
  - llm.vllm
description: vLLM OpenAI-compatible API smoke 测试。
params:
  base_url: http://localhost:8000/v1
  model: default
  prompt: 请用一句话说明当前模型服务是否可用。
  concurrency: 1
  total_requests: 1
  temperature: 0.3
  max_tokens: 128
  timeout: 120
thresholds:
  success_rate_min: 0.95
  avg_latency_max_seconds: 30
